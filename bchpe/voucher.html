<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalle de Operación</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #002a80; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; background-color: #fff; text-align: center; padding: 40px 25px; margin-top: 3px; border-top-left-radius: 28px; border-top-right-radius: 28px; min-height: calc(100vh - 12px); box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }

        /* HEADER PARA VOLVER */
        .top-nav { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 20px; }
        .back-arrow { cursor: pointer; display: flex; align-items: center; padding: 5px; margin-left: -5px; }
        .back-arrow svg { width: 28px; height: 28px; stroke: #444; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }

        /* ICONO CHECK ESTÁTICO (Es un historial, ya no necesita animación) */
        .check-icon svg { width: 75px; height: 75px; fill: none; stroke: #ff7e00; stroke-width: 2.5; margin-bottom: 20px; }
        
        h2 { font-size: 24px; font-weight: 700; margin: 0 0 10px 0; color: #000; }
        .monto-grande { font-size: 54px; font-weight: 500; color: #002a80; margin: 0; line-height: 1.1; }
        .fecha-sub { color: #888; font-size: 18px; margin-top: 12px; margin-bottom: 35px; }
        
        .acciones { display: flex; justify-content: center; gap: 50px; margin-bottom: 45px; }
        .accion-btn { display: flex; align-items: center; gap: 8px; color: #ff7e00; font-weight: 600; font-size: 17px; cursor: pointer; text-decoration: none; }
        .accion-btn img { width: 22px; height: 22px; }
        
        .detalles-lista { width: 100%; text-align: left; margin-bottom: 10px; }
        .fila { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid #b0b0b0; }
        .fila:last-child { border-bottom: none; }
        .label { font-size: 17px; color: #000; font-weight: 400; width: 40%; }
        .valor { text-align: right; font-size: 17px; color: #000; width: 60%; }
        .valor strong { display: block; font-weight: 700; font-size: 18px; margin-bottom: 3px; }
        .valor span { display: block; color: #666; font-size: 15px; margin-bottom: 2px;}

        .separador-banner { width: 100%; height: 1px; background-color: #b0b0b0; margin-bottom: 30px; }
        .banner { width: 100%; background-color: #0039a6; border-radius: 10px; padding: 12px; display: flex; align-items: center; position: relative; margin: 0 0 35px 0; color: white; box-sizing: border-box; overflow: hidden; height: 100px; }
        .banner-img { position: absolute; left: 0; bottom: -5px; height: 100px; width: auto; }
        .banner-text { margin-left: 85px; text-align: left; }
        .banner-text h4 { margin: 0; font-size: 18px; font-weight: 700; }
        .banner-text p { margin: 3px 0 0 0; font-size: 15px; opacity: 0.9; }
        
        .btn-otra { background-color: #ff7e00; color: white; border: none; border-radius: 35px; padding: 15px 0; width: 85%; display: block; margin: 0 auto 20px auto; font-size: 17px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container" id="captureArea">
        <div class="top-nav">
            <div class="back-arrow" onclick="window.history.back()">
                <svg viewBox="0 0 24 24"><path d="M20 12H4M10 6l-6 6 6 6"/></svg>
            </div>
        </div>

        <div class="check-icon">
            <svg viewBox="0 0 50 50">
                <circle cx="25" cy="25" r="23" stroke="#ff7e00" stroke-width="2" fill="none"/>
                <path d="M15 25 L22 32 L35 18" stroke="#ff7e00" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <h2>¡Operación exitosa!</h2>
        <div class="monto-grande" id="vMonto">S/ 0.00</div>
        <div class="fecha-sub" id="vFecha">--</div>

        <div class="acciones" id="divAcciones">
            <div class="accion-btn" onclick="descargarVoucher()"><img src="img/descargar-icon.svg" alt="Descargar"> Descargar</div>
            <div class="accion-btn" onclick="compartirVoucher()"><img src="img/compartir-icon.svg" alt="Compartir"> Compartir</div>
        </div>

        <div class="detalles-lista">
            
            <div class="fila" id="filaDestino">
                <div class="label" id="labelDestino">Enviado a</div>
                <div class="valor" id="valorDestino">
                    </div>
            </div>

            <div class="fila" id="filaComision" style="display: none;">
                <div class="label">Comisión</div>
                <div class="valor">
                    <strong>Gratis</strong>
                </div>
            </div>

            <div class="fila">
                <div class="label">Desde</div>
                <div class="valor">
                    <strong>Cuenta Digital Soles</strong>
                    <span>7809</span>
                </div>
            </div>

            <div class="fila" style="border-bottom: none;"> 
                <div class="label">Número de operación</div>
                <div class="valor">
                    <strong id="vNumOp">00000000</strong>
                </div>
            </div>
        </div>

        <div class="separador-banner" id="divSeparador"></div>

        <div class="banner" id="divBanner">
            <img src="img/super-des.svg" alt="Personaje" class="banner-img">
            <div class="banner-text">
                <h4>Protege tus tarjetas</h4>
                <p>Por solo S/ 13.99 al mes inc. IGV</p>
            </div>
        </div>

        <button class="btn-otra" id="btnCerrar" onclick="window.location.href='cuentas.html'">Volver a movimientos</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const moveId = urlParams.get('id');
            const movimientos = JSON.parse(localStorage.getItem('bcp_movimientos')) || [];
            
            if (moveId !== null && movimientos[moveId]) {
                const mov = movimientos[moveId];
                document.getElementById('vMonto').innerText = `S/ ${parseFloat(mov.monto).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                document.getElementById('vFecha').innerText = mov.fechaCompleta || mov.fecha;
                document.getElementById('vNumOp').innerText = mov.numOperacion || "No disponible";

                const valorDestino = document.getElementById('valorDestino');
                const labelDestino = document.getElementById('labelDestino');

                if (mov.tipo === 'yape') {
                    document.getElementById('filaComision').style.display = 'flex';
                    labelDestino.innerText = 'Enviado a';
                    
                    let celular = mov.destinoNumero || "000000000";
                    let numeroFinal = "*** **0 000";
                    if (celular.length === 9) {
                        const last4 = celular.slice(-4);
                        numeroFinal = `*** **${last4.charAt(0)} ${last4.slice(1)}`;
                    }

                    valorDestino.innerHTML = `
                        <strong>${mov.destinoNombre}</strong>
                        <span style="letter-spacing: 1px;">${numeroFinal}</span>
                        <span>${mov.entidad || 'Yape'}</span> `;
                } 
                else if (mov.tipo === 'transferencia') {
                    document.getElementById('filaComision').style.display = 'flex';
                    labelDestino.innerText = 'Enviado a';
                    let cuentaFull = mov.destinoNumero || "0000";
                    let cuentaFinal = cuentaFull.length >= 4 ? cuentaFull.slice(-4) : cuentaFull;
                    valorDestino.innerHTML = `
                        <strong>${mov.destinoNombre}</strong>
                        <span>****${cuentaFinal}</span>
                        <span>Moneda soles</span>
                    `;
                } 
                else if (mov.tipo === 'servicio') {
                    document.getElementById('filaComision').style.display = 'none';
                    labelDestino.innerText = 'Pagado a'; 
                    valorDestino.innerHTML = `
                        <strong>${mov.destinoNombre}</strong>
                        <span>${mov.servicioNombre}</span>
                        <span>${mov.destinoNumero}</span>
                    `;
                }
            } else {
                alert("Movimiento no encontrado.");
                window.location.href = 'cuentas.html';
            }
        });

        function prepararParaFoto(esParaFoto) {
            const topNav = document.querySelector('.top-nav');
            const botonesSuperior = document.getElementById('divAcciones');
            const btnInferior = document.getElementById('btnCerrar');
            if (esParaFoto) {
                topNav.style.display = 'none';
                botonesSuperior.style.display = 'none';
                btnInferior.style.display = 'none';
            } else {
                topNav.style.display = 'flex';
                botonesSuperior.style.display = 'flex';
                btnInferior.style.display = 'block';
            }
        }

        function descargarVoucher() {
            prepararParaFoto(true); 
            setTimeout(() => {
                html2canvas(document.body, { backgroundColor: '#002a80', scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Voucher_Historial.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    prepararParaFoto(false); 
                });
            }, 150); 
        }

        function compartirVoucher() {
            prepararParaFoto(true);
            setTimeout(() => {
                html2canvas(document.body, { backgroundColor: '#002a80', scale: 2 }).then(canvas => {
                    canvas.toBlob(blob => {
                        const file = new File([blob], `Voucher_Historial.png`, { type: 'image/png' });
                        if (navigator.share) {
                            navigator.share({ title: `Voucher de Pago`, files: [file] }).then(() => {
                                prepararParaFoto(false);
                            }).catch(err => {
                                console.log('Error al compartir:', err);
                                prepararParaFoto(false);
                            });
                        } else {
                            alert('Tu navegador no soporta compartir directo.');
                            prepararParaFoto(false);
                        }
                    });
                });
            }, 150);
        }
    </script>
</body>
</html>
