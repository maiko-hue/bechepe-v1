<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enviar a</title>
    <style>
        /* Optimización para móviles */
        * {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- PANTALLA DE CARGA BLANCA --- */
        #white-loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: 9999;
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
        }

        .loader-container {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-icon { width: 40px; height: 40px; z-index: 2; }

        .spinner-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: #ff7800;
            animation: spin 1s linear infinite;
            z-index: 1;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: #fff;
            border-bottom: 1px solid #e0e0e0;
        }

        .header-title {
            font-size: 20px;
            font-weight: 400;
            color: #444;
            flex-grow: 1;
            margin-left: 15px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
        }
        
        .icon-btn svg {
            width: 28px;
            height: 28px;
            fill: #444;
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 20px;
        }

        /* PASO 1: BUSCADOR */
        #step-1 {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: #f5f5f5;
            border-radius: 8px;
            padding: 12px 15px;
        }

        .search-icon svg {
            width: 20px;
            height: 20px;
            fill: #888;
            margin-right: 12px;
        }

        .search-input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 16px;
            color: #333;
            font-family: inherit;
        }

        .search-input::placeholder {
            color: #777;
            font-weight: 400;
        }

        .footer-container {
            margin-top: auto;
            padding-bottom: 10px;
            display: none; 
        }

        .btn-siguiente {
            width: 100%;
            background-color: #ff7800;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 16px 0;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
        }

        .btn-siguiente:active { background-color: #e06900; }

        /* PASO 2: SELECCIÓN DE YAPE (Oculto al inicio) */
        #step-2 {
            display: none;
            flex-direction: column;
        }

        .yape-option {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .yape-icon img {
            width: 45px;
            height: 45px;
            display: block;
        }

        .yape-text {
            margin-left: 15px;
            font-size: 18px;
            font-weight: 500;
            color: #000;
        }

    </style>
</head>
<body>

    <div id="white-loader-screen">
        <div class="loader-container">
            <div class="spinner-ring"></div>
            <img src="img/cargaicono.svg" alt="Cargando" class="loader-icon">
        </div>
    </div>

    <header class="header">
        <button class="icon-btn" onclick="window.history.back()">
            <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" /></svg>
        </button>
        <div class="header-title">Enviar a</div>
        <button class="icon-btn" onclick="window.location.href='inicio.html'">
            <svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" /></svg>
        </button>
    </header>

    <div class="main-content">
        
        <div id="step-1">
            <div class="search-bar">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </div>
                <input type="tel" id="contactInput" class="search-input" placeholder="Buscar contacto" maxlength="9">
            </div>

            <div class="footer-container" id="footerBtn">
                <button class="btn-siguiente" onclick="irAlSiguiente()">Siguiente</button>
            </div>
        </div>

        <div id="step-2">
            <div class="yape-option" onclick="irAMonto()">
                <div class="yape-icon">
                    <img src="img/LogoYapeCirculo.svg" alt="Yape">
                </div>
                <div class="yape-text">Yape</div>
            </div>
        </div>

    </div>

    <script>
        const input = document.getElementById('contactInput');
        const footer = document.getElementById('footerBtn');

        // Validación de 9 dígitos
        input.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, ''); // Solo números
            if (this.value.length === 9) {
                footer.style.display = 'block';
            } else {
                footer.style.display = 'none';
            }
        });

        function irAlSiguiente() {
            // 1. Guardar el celular
            localStorage.setItem('v_celular_destino', input.value);

            // 2. Mostrar pantalla de carga blanca
            document.getElementById('white-loader-screen').style.display = 'flex';

            // 3. Esperar 1.5 segundos y cambiar de pantalla
            setTimeout(function() {
                document.getElementById('white-loader-screen').style.display = 'none';
                document.getElementById('step-1').style.display = 'none'; // Ocultar buscador
                document.getElementById('step-2').style.display = 'flex'; // Mostrar opción Yape
            }, 1500);
        }

        function irAMonto() {
            // Redirigir al archivo de monto celular
            window.location.href = 'montocel.html';
        }
    </script>

</body>
</html>
