<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Opciones</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Asegura que el body de opciones sea oscuro */
        body.opciones-body {
            background-color: #1a1a1a;
        }
        /* Ajuste clave: Quitar padding lateral para que la tarjeta toque los bordes */
        .opciones-container {
            padding-left: 0 !important;
            padding-right: 0 !important;
            background-color: #1a1a1a;
        }
        /* Como quitamos el padding del contenedor, se lo damos al header */
        .minimal-header {
            padding: 40px 20px 20px 20px;
        }
    </style>
</head>
<body class="opciones-body">

    <div class="mobile-wrapper">
        <div class="mobile-container opciones-container" style="padding: 0 !important;">
            
            <div class="minimal-header">
                <a href="inicio.html" class="back-btn">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                </a>
                <h2>OPCIONES</h2>
            </div>

            <div class="options-card">
                
                <div class="buttons-group">
                    <a href="datos.html" class="option-btn purple" style="text-decoration: none;">
                        <div class="btn-icon-circle">
                            <img src="img/opc-user.svg" alt="" class="btn-icon">
                        </div>
                        <span class="btn-text">DATOS DE MI CUENTA</span>
                    </a>

                    <div class="option-btn purple">
                        <div class="btn-icon-circle">
                            <img src="img/opc-bank.svg" alt="" class="btn-icon">
                        </div>
                        <span class="btn-text">AGREGAR BANCO</span>
                    </div>

                    <div class="option-btn purple">
                        <div class="btn-icon-circle">
                            <img src="img/opc-contact.svg" alt="" class="btn-icon">
                        </div>
                        <span class="btn-text">AGREGAR CONTACTO</span>
                    </div>

                    <div class="option-btn purple">
                        <div class="btn-icon-circle">
                            <img src="img/opc-qr.svg" alt="" class="btn-icon">
                        </div>
                        <span class="btn-text">AGREGAR QR</span>
                    </div>

                    <a href="editable.html" class="option-btn purple" style="text-decoration: none;">
                        <div class="btn-icon-circle">
                            <img src="img/opc-voucher.svg" alt="" class="btn-icon">
                        </div>
                        <span class="btn-text">EDITAR VOUCHER</span>
                    </a>
                </div>

                <p class="section-label">Otras opciones</p>

                <div class="buttons-group">
                    <a href="https://t.me/+6weA5d0fVzFlYTcx" target="_blank" class="option-btn cyan" style="text-decoration: none;">
                        <div class="btn-icon-circle">
                            <img src="img/opc-support.svg" alt="" class="btn-icon">
                        </div>
                        <span class="btn-text">CONTACTAR SOPORTE</span>
                    </a>

                    <a href="sobre.html" class="option-btn cyan" style="text-decoration: none;">
                        <div class="btn-icon-circle">
                            <img src="img/opc-voucher.svg" alt="" class="btn-icon">
                        </div>
                        <span class="btn-text">LEE ESTO</span>
                    </a>
                </div>

                <div style="height: 50px;"></div>
            </div>

        </div>
    </div>

</body>
</html>
